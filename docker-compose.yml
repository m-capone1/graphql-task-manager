services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lush_tasks
      POSTGRES_USER: lush
      POSTGRES_PASSWORD: lush_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lush -d lush_tasks"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lush:lush_secret@db:5432/lush_tasks
    depends_on:
      db:
        condition: service_healthy
    # Runs migrations then starts the server — migrations are idempotent so this is safe
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
